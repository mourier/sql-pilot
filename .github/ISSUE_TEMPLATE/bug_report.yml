name: Bug Report
description: Report a bug in SQL Pilot
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: input
    id: ssms-version
    attributes:
      label: SSMS Version
      description: "e.g., SSMS 22.4.1"
    validations:
      required: true
  - type: input
    id: sqlpilot-version
    attributes:
      label: SQL Pilot Version
      description: "e.g., v1.0.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      description: "e.g., Windows 11 x64"
  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
